name: Deploy server to AWS Lambda

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "packages/committee-engine/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      # Production dependencies only — keeps the deployment package small.
      - run: npm ci --omit=dev

      # Bundle the handler with the shared committee engine inlined — the zip
      # has no workspace resolution, so the engine package is aliased straight
      # to its source. Only @huggingface/transformers stays external (native
      # onnxruntime binaries can't be bundled); it ships via node_modules.
      - name: Bundle handler
        run: npm run bundle

      # Lambda handler must be set to "dist/index.handler" (one-time config —
      # server/scripts/setup-daily-report.sh does it).
      - name: Package function
        run: zip -r ../function.zip dist package.json node_modules

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://../function.zip \
            --publish
