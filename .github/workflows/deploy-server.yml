name: Deploy server to AWS Lambda

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "packages/committee-engine/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      # Full install so esbuild can resolve every import while bundling. The
      # deployment zip does NOT ship this node_modules — package-lambda.sh
      # stages a minimal runtime-only install (just @huggingface/transformers,
      # pruned to linux/x64) to stay under Lambda's ~70MB upload limit.
      - run: npm ci --omit=dev

      # Bundles the handler (shared committee engine inlined) and zips it with
      # the pruned runtime dependencies. Lambda handler must be set to
      # "dist/index.handler" (one-time config — setup-daily-report.sh does it).
      - name: Bundle + package function
        run: ./scripts/package-lambda.sh "$GITHUB_WORKSPACE/function.zip"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file "fileb://$GITHUB_WORKSPACE/function.zip" \
            --publish
